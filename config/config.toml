[region-classifier]
model_path = 'models/rc/rc_net_script.pt' # [UNUSED]
num_classes = 16
region_ids = [ '10S', '10T', '11R', '12R', '16T', '17R', '17T', '18S', '32S', '32T', '33S', '33T', '53S', '52S', '54S', '54T' ]
resolution = 224